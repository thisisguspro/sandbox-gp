<!doctype html>
<!-- SANDBOX GP — visual dev harness. NOT shipped to players.
     Runs the real world/car/track modules with a LOCAL sim (no server) so the
     look can be iterated with headless screenshots.
     Query params: ?t=12 (fast-forward seconds) &cam=chase|orbit|front|high &fov=55 -->
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;overflow:hidden;background:#fff3d6}
  #hud{position:fixed;left:14px;top:12px;font:700 15px system-ui;color:#5a4632;
       background:rgba(255,247,234,.85);padding:8px 12px;border-radius:12px}
</style></head><body>
<div id="hud">SANDBOX GP — harness</div>
<script type="importmap">{"imports":{"three":"/node_modules/three/build/three.module.js"}}</script>
<script type="module">
import * as THREE from "three";
import { makeTrack } from "/src/game/shared/track.js";
import { stepCar, separateCars, CAR } from "/src/game/shared/carSim.js";
import { buildWorld } from "/src/game/world.js";
import { buildCar, animateCar } from "/src/game/carMesh.js";
import { PALETTE } from "/src/game/palette.js";

const q = new URLSearchParams(location.search);
const FF = +(q.get("t") || 0);
const CAM = q.get("cam") || "chase";
const FOV = +(q.get("fov") || 58);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const track = makeTrack("sandcastle");
buildWorld(scene, track);

// ---- local racers: pure-pursuit drivers (mirror of the server bot) ----
const COLORS = [PALETTE.toyRed, PALETTE.toyYellow, PALETTE.toyBlue, PALETTE.toyGreen];
const cars = [];
for (let i = 0; i < 4; i++) {
  const mesh = buildCar({ bodyColor: COLORS[i] });
  mesh.traverse((o) => { if (o.isMesh) o.castShadow = true; });
  scene.add(mesh);
  const slot = trackGrid(i);
  cars.push({
    mesh,
    state: { x: slot.x, z: slot.z, heading: slot.heading, speed: 0, offTrack: false, sampleHint: -1 },
    bot: { look: 13 + i * 2.2, aggro: 0.86 + i * 0.045 },
    steer: 0,
  });
}
function trackGrid(slot) { return track.gridPose(slot); }

function botInput(c) {
  const t = track, s = c.state;
  let j = t.nearest(s.x, s.z, s.sampleHint), left = c.bot.look;
  s.sampleHint = j;
  while (left > 0) { const a = t.at(j), b = t.at(j + 1); left -= Math.hypot(b.x - a.x, b.z - a.z); j++; }
  const tgt = t.at(j);
  let dh = Math.atan2(tgt.z - s.z, tgt.x - s.x) - s.heading;
  while (dh > Math.PI) dh -= 2 * Math.PI;
  while (dh < -Math.PI) dh += 2 * Math.PI;
  const steer = Math.max(-1, Math.min(1, dh * 2.2));
  let k = j, ahead = 18;
  while (ahead > 0) { const a = t.at(k), b = t.at(k + 1); ahead -= Math.hypot(b.x - a.x, b.z - a.z); k++; }
  const t0 = t.at(s.sampleHint), t1 = t.at(k);
  const turn = Math.abs(t0.tx * t1.tz - t0.tz * t1.tx);
  const targetSpeed = CAR.MAX_SPEED * c.bot.aggro * (1 - 0.62 * turn);
  const throttle = s.speed < targetSpeed ? 1 : (s.speed > targetSpeed + 2.5 ? -0.5 : 0.15);
  return { throttle, steer };
}

const DT = 1 / 60;
function sim(dt) {
  for (const c of cars) {
    const inp = botInput(c);
    c.steer = inp.steer;
    stepCar(c.state, inp, dt, track);
  }
  for (let i = 0; i < cars.length; i++)
    for (let j = i + 1; j < cars.length; j++)
      separateCars(cars[i].state, cars[j].state);
}
// fast-forward for screenshots mid-race
for (let s = 0; s < FF; s += DT) sim(DT);

// ---- cameras ----
const cam = new THREE.PerspectiveCamera(FOV, innerWidth / innerHeight, 0.1, 600);
const mirrorCam = new THREE.PerspectiveCamera(62, 3.4, 0.1, 400);

function placeCamera() {
  const me = cars[0].state;
  if (CAM === "orbit") {
    const a = performance.now() * 0.00012 + 2.2;
    cam.position.set(me.x + Math.cos(a) * 26, 14, me.z + Math.sin(a) * 26);
    cam.lookAt(me.x, 1, me.z);
  } else if (CAM === "front") {
    cam.position.set(me.x + Math.cos(me.heading) * 7.5, 2.2, me.z + Math.sin(me.heading) * 7.5);
    cam.lookAt(me.x, 1.2, me.z);
  } else if (CAM === "high") {
    cam.position.set(me.x - 30, 55, me.z + 40);
    cam.lookAt(me.x, 0, me.z);
  } else { // chase — the real game camera: raised, straight behind
    const back = 7.4, up = 3.4;
    const tx = me.x - Math.cos(me.heading) * back;
    const tz = me.z - Math.sin(me.heading) * back;
    cam.position.lerp(new THREE.Vector3(tx, up, tz), 1); // no smoothing in harness
    cam.lookAt(me.x + Math.cos(me.heading) * 6, 1.1, me.z + Math.sin(me.heading) * 6);
  }
  // mirror: from just above the driver, looking straight back
  mirrorCam.position.set(me.x, 2.1, me.z);
  mirrorCam.lookAt(me.x - Math.cos(me.heading) * 10, 1.6, me.z - Math.sin(me.heading) * 10);
}

function draw() {
  const W = innerWidth, H = innerHeight;
  renderer.setViewport(0, 0, W, H);
  renderer.setScissorTest(false);
  renderer.render(scene, cam);
  if (CAM === "chase") {
    // rear-view mirror inset, top-center
    const mw = Math.floor(W * 0.26), mh = Math.floor(mw / 3.4);
    const mx = Math.floor((W - mw) / 2), my = H - mh - 14;
    renderer.setScissorTest(true);
    renderer.setScissor(mx, my, mw, mh);
    renderer.setViewport(mx, my, mw, mh);
    renderer.render(scene, mirrorCam);
    renderer.setScissorTest(false);
  }
}

let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  sim(dt);
  for (const c of cars) {
    c.mesh.position.x = c.state.x;
    c.mesh.position.z = c.state.z;
    c.mesh.rotation.y = -c.state.heading;
    animateCar(c.mesh, { speed: c.state.speed, steer: c.steer, offTrack: c.state.offTrack }, dt);
  }
  placeCamera();
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
window.__ready = true;
</script></body></html>
