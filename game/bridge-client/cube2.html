<!doctype html><html><body style="margin:0">
<script type="importmap">{"imports":{"three":"/node_modules/three/build/three.module.js"}}</script>
<script type="module">
import * as THREE from "three";
const r = new THREE.WebGLRenderer({antialias:false}); r.setSize(400,300); document.body.appendChild(r.domElement);
const gl = r.getContext();
console.log("GL_RENDERER:", gl.getParameter(gl.RENDERER));
const s = new THREE.Scene(); s.background = new THREE.Color(0x203040);
const c = new THREE.PerspectiveCamera(50, 400/300, 0.1, 100); c.position.set(0,0,3); c.lookAt(0,0,0);
const m1 = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({color:0xff0000}));
m1.position.x = -0.8; s.add(m1);
const m2 = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0x00ff00}));
m2.position.x = 0.8; m2.rotation.y = 0.6; s.add(m2);
s.add(new THREE.AmbientLight(0xffffff, 0.8));
const d = new THREE.DirectionalLight(0xffffff, 2); d.position.set(2,3,4); s.add(d);
r.render(s,c);
console.log("draw calls:", r.info.render.calls, "tris:", r.info.render.triangles);
</script></body></html>
