services:
  backend:
    build: .
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATA_STORE: memory            # swap to "postgres" once store/postgres.js exists
      JWT_SECRET: dev-only-change-me
      ADMIN_KEY: dev-admin-key
      # GOOGLE_CLIENT_ID: your-real-id-here
      # GOOGLE_CLIENT_SECRET: your-real-secret-here
